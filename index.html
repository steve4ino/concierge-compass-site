<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concierge Compass</title>
  <script>
    // Older app builds send password-reset emails without an explicit redirect,
    // so their recovery tokens land here (the Site URL). Forward them to the
    // reset page with the URL hash intact.
    if (location.hash.includes('type=recovery')) {
      location.replace('/reset-password/' + location.hash);
    }
  </script>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #FAF8F5; color: #3D3630;
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center; padding: 24px;
    }
    h1 { font-size: 2rem; margin: 0 0 8px; }
    p { color: #7A6F66; margin: 0 0 24px; }
    a { color: #3D3630; }
    .links { display: flex; gap: 20px; justify-content: center; font-size: 0.95rem; }
  </style>
</head>
<body>
  <main>
    <h1>Concierge Compass</h1>
    <p>Plan trips like a travel notebook — itineraries, maps, and AI recommendations.</p>
    <nav class="links">
      <a href="https://legal.concierge-compass.com/privacy/">Privacy Policy</a>
      <a href="https://legal.concierge-compass.com/terms/">Terms of Service</a>
    </nav>
  </main>
</body>
</html>
